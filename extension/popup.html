<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 280px;
    margin: 0;
    padding: 14px;
    background: #0b0f0e;
    color: #dbe6e1;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 13px;
  }
  h1 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #7c8f88;
    margin: 0 0 10px;
    font-weight: 500;
  }
  .status {
    background: #121917;
    border: 1px solid #22302b;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .status .big { color: #e0b34d; font-size: 20px; font-weight: 700; }
  .status .meta { color: #7c8f88; font-size: 11px; margin-top: 4px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat {
    background: #121917;
    border: 1px solid #22302b;
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
  }
  .stat .k { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #7c8f88; margin-bottom: 4px; }
  .stat .v { font-family: 'SF Mono', Menlo, monospace; font-size: 14px; color: #dbe6e1; }
  label { display: block; margin-bottom: 4px; color: #7c8f88; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  select, input[type=text] {
    width: 100%;
    box-sizing: border-box;
    background: #161f1c;
    border: 1px solid #22302b;
    color: #dbe6e1;
    border-radius: 6px;
    padding: 7px 9px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    margin-bottom: 10px;
  }
  button {
    width: 100%;
    background: #e0b34d;
    color: #26200e;
    border: none;
    border-radius: 6px;
    padding: 8px;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
  }
  button.ghost {
    background: transparent;
    border: 1px solid #22302b;
    color: #dbe6e1;
  }
  p.hint { color: #7c8f88; font-size: 11px; line-height: 1.4; margin: 0 0 10px; }
</style>
</head>
<body>
  <h1>// leetcoin sync</h1>
  <div class="status">
    <div class="big" id="balanceVal">-</div>
    <div class="meta" id="statusMeta">no scrape yet — open leetcode.com</div>
  </div>

  <div class="stats-grid">
    <div class="stat"><span class="k">Rank</span><span class="v" id="rankVal">-</span></div>
    <div class="stat"><span class="k">Streak</span><span class="v" id="streakVal">-</span></div>
    <div class="stat"><span class="k">Solved</span><span class="v" id="solvedVal">-</span></div>
  </div>

  <button id="rescanBtn">Re-scan current tab</button>
  <button id="copyBtn" class="ghost">Copy balance</button>

  <p class="hint">If a value above is wrong or missing, open leetcode.com, right-click the number → Inspect, copy a CSS selector for it, pick the field below, and save.</p>
  <label for="overrideField">Field to override</label>
  <select id="overrideField">
    <option value="balance">Balance</option>
    <option value="rank">Rank</option>
    <option value="streak">Streak</option>
    <option value="solved">Solved</option>
  </select>
  <label for="overrideInput">CSS selector</label>
  <input type="text" id="overrideInput" placeholder="e.g. [data-testid=coin-count]">
  <button id="saveOverrideBtn" class="ghost">Save selector</button>

  <script src="popup.js"></script>
</body>
</html>
